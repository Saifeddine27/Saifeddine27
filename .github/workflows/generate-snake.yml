name: Generate Snake

on:
  # S'exécute automatiquement toutes les 12 heures
  schedule:
    - cron: "0 */12 * * *"
  
  # Permet de lancer l'action manuellement depuis l'onglet Actions
  workflow_dispatch:
  
  # S'exécute à chaque push sur la branche principale
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Génère le jeu du serpent à partir des contributions d'un utilisateur GitHub
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Pousse le contenu de <build_dir> sur a branch gh-pages
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: gh-pages
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
